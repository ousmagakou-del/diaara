name: Daily DB Backup

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase backup-db function
        # Note : SUPABASE_ANON_KEY est publique (visible cote frontend), donc OK
        # de l'avoir en clair ici. Seul BACKUP_TOKEN est sensible et reste en secret.
        env:
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4aGhucm53b3J3cm53bXFla21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTExMzYsImV4cCI6MjA5NDA4NzEzNn0.l_7-Eg06UFnXvSw1BQiuNw0yU94jillHNycx-jvP1Aw"
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "https://qxhhnrnworwrnwmqekmb.supabase.co/functions/v1/backup-db" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "x-backup-token: ${{ secrets.BACKUP_TOKEN }}")

          echo "HTTP $HTTP_CODE"
          cat /tmp/response.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Backup failed with HTTP $HTTP_CODE"
            exit 1
          fi

          if ! grep -q '"success":true' /tmp/response.json; then
            echo "❌ Backup response indicates failure"
            exit 1
          fi

          echo "✓ Backup successful"
